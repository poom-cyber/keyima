# netlify.toml — ไซต์แอดมิน KEYIMA (Netlify) — แยกไซต์/แยกโดเมนจากหน้าร้าน
# Netlify Base directory: fe/admin   ·   Publish directory: fe/admin
# *** เปลี่ยน https://keyima-api.onrender.com เป็น URL backend จริงของคุณ ***
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cross-Origin-Opener-Policy = "same-origin"
    # ห้าม index หน้าแอดมินโดย search engine
    X-Robots-Tag = "noindex, nofollow"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; img-src 'self' data: https://cf.shopee.co.th https://placehold.co https://keyima-api.onrender.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://keyima-api.onrender.com"
