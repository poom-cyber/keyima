<!DOCTYPE html>
<html lang="th">
<head>
  <link rel="icon" type="image/png" href="assets/img/logo-keyima-128.png">
  <link rel="apple-touch-icon" href="assets/img/logo-keyima.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สินค้าทั้งหมด — KEYIMA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="container">
    <div class="shop-layout">
      <!-- Filters (เดสก์ท็อป) -->
      <aside class="filters">
        <div class="filter-block">
          <h4>หมวดสินค้า</h4>
          <label class="filter-opt"><input type="radio" name="cat" value="all"> ทั้งหมด</label>
          <label class="filter-opt"><input type="radio" name="cat" value="kuji"> Ichiban Kuji</label>
          <label class="filter-opt"><input type="radio" name="cat" value="pokemon"> การ์ดโปเกม่อน</label>
        </div>
        <div class="filter-block">
          <h4>สถานะ</h4>
          <label class="filter-opt"><input type="checkbox" name="status" value="instock"> พร้อมส่ง</label>
          <label class="filter-opt"><input type="checkbox" name="status" value="preorder"> พรีออเดอร์</label>
        </div>
        <div class="filter-block">
          <h4>ช่วงราคา</h4>
          <label class="filter-opt"><input type="radio" name="price" value="all" checked> ทั้งหมด</label>
          <label class="filter-opt"><input type="radio" name="price" value="0-2000"> ต่ำกว่า ฿2,000</label>
          <label class="filter-opt"><input type="radio" name="price" value="2000-5000"> ฿2,000 – ฿5,000</label>
          <label class="filter-opt"><input type="radio" name="price" value="5000-999999"> มากกว่า ฿5,000</label>
        </div>
        <div class="filter-block">
          <h4>ซีรีส์ / อนิเมะ</h4>
          <select class="select" id="series-filter" style="width:100%">
            <option value="">ทุกซีรีส์</option>
          </select>
        </div>
      </aside>

      <!-- รายการสินค้า -->
      <main>
        <h1 id="page-title" style="font-size:1.7rem;font-weight:800;margin-bottom:18px;">สินค้าทั้งหมด</h1>

        <!-- chips หมวด (มือถือ) -->
        <div class="cat-chips" id="cat-chips"></div>

        <div class="shop-toolbar">
          <div class="search-box">
            <input type="text" id="search" placeholder="ค้นหาชื่อสินค้า ซีรีส์ เช่น Charizard, Gojo, One Piece…">
          </div>
          <select class="select" id="sort">
            <option value="new">เรียง: มาใหม่ล่าสุด</option>
            <option value="price-asc">ราคา: ต่ำ → สูง</option>
            <option value="price-desc">ราคา: สูง → ต่ำ</option>
            <option value="name">ชื่อ: ก–ฮ</option>
            <option value="series">ซีรีส์ / อนิเมะ: ก–ฮ</option>
          </select>
        </div>

        <div class="result-count" id="result-count"></div>
        <div class="product-grid product-grid--shop" id="grid"></div>
      </main>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/products.js"></script>
</body>
</html>
