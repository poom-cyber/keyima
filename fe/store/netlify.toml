# netlify.toml — ไซต์หน้าร้าน KEYIMA (Netlify)
# Netlify Base directory: fe/store   ·   Publish directory: fe/store
# *** เปลี่ยน https://keyima-api.onrender.com เป็น URL backend จริงของคุณ ***
[build]
  publish = "."

# URL สะอาด: /index.html → /
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; img-src 'self' data: https://cf.shopee.co.th https://promptpay.io https://placehold.co https://keyima-api.onrender.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://keyima-api.onrender.com"
